<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Axone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #222; }
    header { background: #111; color: white; padding: 24px 40px; }
    header h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; }
    header p { font-size: 12px; color: #888; margin-top: 4px; }
    .search { padding: 40px 40px 20px; max-width: 800px; margin: 0 auto; }
    .search input { width: 100%; padding: 16px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
    .search input:focus { border-color: #111; }
    .search button { margin-top: 12px; padding: 12px 32px; background: #111; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .search button:hover { background: #333; }
    .filtres { padding: 0 40px 20px; max-width: 800px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; }
    .filtre { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; background: white; color: #555; transition: all 0.15s; }
    .filtre:hover { border-color: #111; color: #111; }
    .filtre.actif { background: #111; color: white; border-color: #111; }
    .resultats { padding: 0 40px 40px; max-width: 800px; margin: 0 auto; }
    .fiche { background: white; border: 1px solid #e0e0e0; border-radius: 4px; padding: 24px; margin-bottom: 16px; display: flex; gap: 24px; cursor: pointer; }
    .fiche:hover { border-color: #999; }
    .fiche img { width: 200px; height: 140px; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }
    .fiche-info { flex: 1; }
    .fiche-nom { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .fiche-noeud { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 12px; }
    .fiche-meta { font-size: 12px; color: #999; }
    .score { display: inline-block; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #666; margin-left: 8px; }
    .loading { text-align: center; padding: 40px; color: #999; display: none; }
    .nb-resultats { font-size: 12px; color: #999; margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <h1>AXONE</h1>
  <p>Base de données de détails constructifs</p>
</header>

<div class="search">
  <input type="text" id="question" placeholder="Décrivez votre situation constructive — ex: jonction toiture terrasse façade bois isolation extérieure" />
  <button onclick="chercher()">Rechercher</button>
</div>

<div class="filtres">
  <span class="filtre actif" onclick="setFiltre(this, '')">Tous</span>
  <span class="filtre" onclick="setFiltre(this, 'bois')">Bois</span>
  <span class="filtre" onclick="setFiltre(this, 'acier')">Acier</span>
  <span class="filtre" onclick="setFiltre(this, 'beton')">Béton</span>
  <span class="filtre" onclick="setFiltre(this, 'maçonnerie')">Maçonnerie</span>
  <span class="filtre" onclick="setFiltre(this, 'verre')">Verre</span>
  <span class="filtre" onclick="setFiltre(this, '1:5')">1:5</span>
  <span class="filtre" onclick="setFiltre(this, '1:10')">1:10</span>
  <span class="filtre" onclick="setFiltre(this, '1:20')">1:20</span>
  <span class="filtre" onclick="setFiltre(this, '1:50')">1:50</span>
</div>

<div class="loading" id="loading">Recherche en cours...</div>
<div class="resultats" id="resultats"></div>

<script>
const SUPABASE_URL = "https://nvdydrkepsfubkhionra.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52ZHlkcmtlcHNmdWJraGlvbnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMjc1OTAsImV4cCI6MjA4NzkwMzU5MH0.8dzTrj6wlmgQLzqH8DzmgXcZOx1pYHovmfiheiRvyw8"
const OPENAI_KEY = ""

let filtreActif = ""
let dernierResultats = []

function setFiltre(el, valeur) {
  document.querySelectorAll(".filtre").forEach(f => f.classList.remove("actif"))
  el.classList.add("actif")
  filtreActif = valeur
  afficherResultats(dernierResultats)
}

function filtrer(fiches) {
  if (!filtreActif) return fiches
  return fiches.filter(fiche => {
    const systeme = (fiche.systeme_constructif || "").toLowerCase()
    const echelle = (fiche.echelle_estimee || "").toLowerCase()
    const tags = (fiche.tags || "").toLowerCase()
    const materiaux = (fiche.materiaux || "").toLowerCase()
    const filtre = filtreActif.toLowerCase()
    return systeme.includes(filtre) || echelle.includes(filtre) || tags.includes(filtre) || materiaux.includes(filtre)
  })
}

function afficherResultats(fiches) {
  const filtrees = filtrer(fiches)
  const container = document.getElementById("resultats")
  container.innerHTML = ""

  if (filtrees.length === 0) {
    container.innerHTML = '<div class="nb-resultats">Aucun résultat pour ce filtre.</div>'
    return
  }

  container.innerHTML = '<div class="nb-resultats">' + filtrees.length + ' résultat(s)</div>'

  filtrees.forEach(fiche => {
    const similarite = Math.round((fiche.similarite || 0) * 100)
    const tags = fiche.tags ? JSON.parse(fiche.tags).slice(0, 3).join(", ") : ""
    const img_url = SUPABASE_URL + "/storage/v1/object/public/Images/" + fiche.image

    container.innerHTML += `
      <div class="fiche" onclick="window.location='detail.html?id=${fiche.id}'">
        <img src="${img_url}" onerror="this.style.display='none'">
        <div class="fiche-info">
          <div class="fiche-nom">
            ${fiche.nom}
            <span class="score">${similarite}%</span>
          </div>
          <div class="fiche-noeud">${fiche.noeud}</div>
          <div class="fiche-meta">${fiche.source_pdf} — ${tags}</div>
        </div>
      </div>
    `
  })
}

async function getEmbedding(texte) {
  const response = await fetch("/api/embed", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: texte })
  })
  const data = await response.json()
  return data.data[0].embedding
}

async function chercher() {
  const question = document.getElementById("question").value
  if (!question) return

  document.getElementById("loading").style.display = "block"
  document.getElementById("resultats").innerHTML = ""

  const embedding = await getEmbedding(question)

  const response = await fetch(SUPABASE_URL + "/rest/v1/rpc/rechercher_fiches", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ query_embedding: embedding, nb_resultats: 20 })
  })

  dernierResultats = await response.json()
  document.getElementById("loading").style.display = "none"
  afficherResultats(dernierResultats)
}

document.getElementById("question").addEventListener("keypress", function(e) {
  if (e.key === "Enter") chercher()
})
</script>

</body>
</html>
